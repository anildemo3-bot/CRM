version: '3.8'

services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - redis
    ports:
      - "3010:3000"
    environment:
      DATABASE_URL: "postgresql://user:password@postgres:5432/crm_db?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "your-super-secret"
      # Add OpenAI/Stripe keys here if available

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3011:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3010"

volumes:
  postgres_data:
